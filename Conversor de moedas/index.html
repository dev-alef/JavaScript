<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <img class="logo" src="./assets/logo.jpg" alt="logo-currency-converter" />
    <br>
    <a href="http://www.freepik.com">Image Designed by Freepik</a>
    <main>
      <label>
        Converter <b>de:</b>
        <select class="select">
          <option>R$ Real Brasileiro</option>
        </select>
      </label>

      <label>
        <b>Para:</b>
        <select class="select">
          <option>US$ Dólar Americano</option>
          <option>€ Euro</option>
        </select>
      </label>
      <label>
        Valor
        <input placeholder="R$ 10.000,00" />
      </label>

      <button>Converter</button>
      <section>
        <div class="currency-box">
          <img src="./assets/real.png" alt="logo-real" />
          <p class="currency">Real</p>
          <p class="currency-value">R$ 0,00</p>
        </div>

        <img class="arrow-img" src="./assets/arrow.png" alt="seta" />

        <div class="currency-box">
          <img src="./assets/dolar.png" alt="logo-dollar" />
          <p class="currency">Dolar</p>
          <p class="currency-value">U$ 0,00</p>
        </div>
      </section>
    </main>
  </body>
</html>
